name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: System libs for PySide6 (offscreen)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Headless smoke + screenshot
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m tools.run_headless

      - name: Upload smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-smoke
          path: docs/images/headless_smoke.png
          if-no-files-found: ignore
